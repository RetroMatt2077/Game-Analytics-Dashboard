<!DOCTYPE html>
<html>
<head>
    <title>Game Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            border: 1px solid #334155;
            padding: 10px;
        }

        th {
            background: #38bdf8;
            color: black;
        }
    </style>
</head>
<body>

<h1>🎮 Game Analytics Dashboard</h1>

<div class="card">
    <h2>🏆 Top Player: {{ top_player }}</h2>
    <h3>⭐ Skill Score: {{ top_score }}</h3>
</div>

<div class="card">
    {{ tables | safe }}
</div>

</body>
</html>
